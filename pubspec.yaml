name: wearwise
description: "穿戴管家 - 跨平台衣橱管理App"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # 状态管理
  provider: ^6.1.1
  
  # 数据持久化
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # 图片处理
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  
  # UI组件
  table_calendar: ^3.0.9
  flutter_staggered_grid_view: ^0.7.0
  
  # 通知
  flutter_local_notifications: ^17.0.0
  
  # 其他工具
  intl: ^0.20.2
  permission_handler: ^11.2.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  amap_flutter_location_plus: ^3.1.2
  
  # 液态玻璃效果
  liquid_glass_easy: ^1.1.1
  
  # HTTP 请求
  http: ^1.2.0
  
  # HTML 解析
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/images/

# 应用图标配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  # 可选：分别为 Android 和 iOS 指定不同的图标
  # image_path_android: "assets/images/app_icon_android.png"
  # image_path_ios: "assets/images/app_icon_ios.png"
  remove_alpha_ios: true
  # Android 自适应图标配置
  adaptive_icon_background: "#FFFFFF"  # 白色背景
  # adaptive_icon_foreground: "assets/images/app_icon_foreground.png"  # 如果需要前景图层
